<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Predictor | Berat Badan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; }
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .result-box { background-color: #e7f3ff; border-left: 5px solid #007bff; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row">
        <div class="col-md-5">
            <div class="card p-4 mb-4">
                <h4 class="text-center mb-4">🏋️ Prediksi Berat Badan</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Input Kalori (kkal)</label>
                        <input type="number" name="kalori" class="form-control" placeholder="Contoh: 2500" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Hitung Prediksi</button>
                </form>

                {% if hasil %}
                <div class="result-box mt-4">
                    <h6 class="text-primary">Hasil Prediksi:</h6>
                    <p class="mb-0">Kalori: <b>{{ kalori }}</b> → Berat: <b>{{ hasil }} kg</b></p>
                </div>
                {% endif %}
            </div>

            <div class="card p-3">
                <h6>📊 Dataset Training</h6>
                <table class="table table-sm table-striped mt-2" style="font-size: 0.85rem;">
                    <thead>
                        <tr>
                            <th>Kalori</th>
                            <th>Berat (kg)</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in data_tabel %}
                        <tr>
                            <td>{{ row.kalori }}</td>
                            <td>{{ row.berat_badan }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4 h-100">
                <h6>📈 Visualisasi Regresi Linear</h6>
                <canvas id="myChart"></canvas>
            </div>
        </div>
    </div>

    <footer class="mt-5 text-center text-muted">
        &copy; 2026 [FAJAR Co] | prediksi-berat
    </footer>
</div>

<script>
    const ctx = document.getElementById('myChart');
    // Ganti baris 74 yang lama dengan ini:
const dataTabel = JSON.parse('{{ data_tabel | tojson | safe }}');
    
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: dataTabel.map(row => row.kalori),
            datasets: [{
                label: 'Tren Kenaikan Berat',
                data: dataTabel.map(row => row.berat_badan),
                borderColor: '#007bff',
                backgroundColor: 'rgba(0, 123, 255, 0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            scales: {
                x: { title: { display: true, text: 'Kalori' } },
                y: { title: { display: true, text: 'Berat Badan (kg)' } }
            }
        }
    });
</script>

</body>
</html>
